<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta Exact - Dashboard Analytics</title>
    
    <meta name="theme-color" content="#ea580c">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
      }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc; 
            color: #0f172a; 
            overflow: hidden; 
        }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-fade { animation: fade 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

        const { useState, useEffect, useMemo, useRef } = React;

        // --- KONFIGURASI ---
        const DB_KEY = 'BETA_EXACT_DB_DASH';
        const LOGS_KEY = 'BETA_EXACT_LOGS_DASH';
        const CONTACT = "+62 857-9808-5688";
        const ADDRESS = "Sukamanah, Bojong, Purwakarta";
        const MAPS_URL = "https://maps.app.goo.gl/WT8CXTzQT7xe8sUx9?g_st=ac";
        const DAYS = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"];
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'beta-exact-dash';
        const APP_VERSION = "12.0 (Pro Edition)";

        // Firebase Init (Ganti API_KEY dan lainnya dengan punya Anda jika sudah siap)
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = { apiKey: "API_KEY", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        }
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- IKON SVG (24x24px) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                users: <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                calendar: <g><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></g>,
                megaphone: <g><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></g>,
                info: <g><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></g>,
                plus: <g><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></g>,
                minus: <g><line x1="5" x2="19" y1="12" y2="12"/></g>,
                search: <g><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></g>,
                edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
                trash: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></g>,
                check: <g><polyline points="20 6 9 17 4 12"/></g>,
                clock: <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                map: <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></g>,
                whatsapp: <g><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 3.8.9L21 3z"/></g>,
                send: <g><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></g>,
                refresh: <g><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></g>,
                x: <g><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></g>,
                cloud: <g><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></g>,
                download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></g>,
                fileText: <g><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></g>,
                book: <g><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('siswa');
            const [searchTerm, setSearchTerm] = useState('');
            const [isLoaded, setIsLoaded] = useState(false);

            // Modals & UI States
            const [modals, setModals] = useState({ form: false, attendance: false, adjustSession: false });
            const [editingId, setEditingId] = useState(null);
            const [activeStudent, setActiveStudent] = useState(null);
            
            // Custom Notifications
            const [toastMsg, setToastMsg] = useState('');
            const [confirmObj, setConfirmObj] = useState({ isOpen: false, msg: '', onConfirm: null });

            // Form States
            const initialForm = { name: '', parent: '', phone: '', deposit: '', schedules: [] };
            const [form, setForm] = useState(initialForm);
            const [attendanceNote, setAttendanceNote] = useState('');
            
            // Adjust Session States
            const [adjustType, setAdjustType] = useState('add'); 
            const [adjustAmount, setAdjustAmount] = useState('');
            const [adjustNote, setAdjustNote] = useState('');

            // Broadcast States
            const [broadcastMsg, setBroadcastMsg] = useState('');
            const [broadcastQueue, setBroadcastQueue] = useState([]);

            const scheduleRef = useRef(null);

            // Init Data & Auth
            useEffect(() => {
                const initData = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        const savedData = localStorage.getItem(DB_KEY);
                        const savedLogs = localStorage.getItem(LOGS_KEY);
                        if (savedData) setStudents(JSON.parse(savedData));
                        if (savedLogs) setLogs(JSON.parse(savedLogs));
                        setIsLoaded(true);
                    }
                };
                initData();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubStudents = onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'students'), (snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStudents(data);
                    localStorage.setItem(DB_KEY, JSON.stringify(data));
                    setIsLoaded(true);
                }, () => setIsLoaded(true));

                const unsubLogs = onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'logs'), (snap) => {
                    const dataLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => new Date(b.date) - new Date(a.date));
                    setLogs(dataLogs);
                    localStorage.setItem(LOGS_KEY, JSON.stringify(dataLogs));
                });

                return () => { unsubStudents(); unsubLogs(); };
            }, [user]);

            const filteredStudents = useMemo(() => {
                return students.filter(s => (s.name || "").toLowerCase().includes(searchTerm.toLowerCase()))
                               .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            }, [students, searchTerm]);

            const formatWA = (phone) => {
                if (!phone) return "";
                let p = phone.replace(/[^0-9]/g, '');
                return p.startsWith('0') ? '62' + p.slice(1) : p;
            };

            // UI Helpers
            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };
            const askConfirm = (msg, callback) => setConfirmObj({ isOpen: true, msg, onConfirm: callback });
            const closeConfirm = () => setConfirmObj({ isOpen: false, msg: '', onConfirm: null });

            // Logging
            const addLog = async (studentName, type, amount, note) => {
                const newLog = { date: new Date().toISOString(), studentName, type, amount, note };
                if (user) {
                    try { await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'logs'), newLog); } 
                    catch (e) { console.error("Log error"); }
                } else {
                    setLogs(prev => [{id: Date.now(), ...newLog}, ...prev]);
                }
            };

            // Jadwal
            const toggleScheduleDay = (day, isChecked) => {
                setForm(prev => {
                    let newSchedules = [...(prev.schedules || [])];
                    if (isChecked) newSchedules.push({ day, time: '16:00' });
                    else newSchedules = newSchedules.filter(sch => sch.day !== day);
                    return { ...prev, schedules: newSchedules };
                });
            };
            const updateScheduleTime = (day, newTime) => {
                setForm(prev => ({ ...prev, schedules: prev.schedules.map(sch => sch.day === day ? { ...sch, time: newTime } : sch) }));
            };

            // CRUD Siswa
            const handleSaveStudent = async (e) => {
                e.preventDefault();
                if (!form.name.trim()) return showToast("Nama siswa wajib diisi!");
                if (!form.schedules || form.schedules.length === 0) return showToast("Pilih minimal 1 hari mengajar!");
                if (!form.deposit || parseInt(form.deposit) <= 0) return showToast("Sesi tidak boleh kosong!");

                const studentData = {
                    name: form.name, parent: form.parent, phone: form.phone, deposit: parseInt(form.deposit), schedules: form.schedules,
                    attendanceCount: editingId ? (students.find(s => s.id === editingId)?.attendanceCount || 0) : 0
                };

                if (user) {
                    try {
                        if (editingId) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'students', editingId), studentData);
                        else {
                            await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'students'), studentData);
                            addLog(studentData.name, 'Siswa Baru', parseInt(form.deposit), 'Pendaftaran Awal');
                        }
                        showToast(editingId ? "Data diperbarui" : "Siswa ditambahkan");
                    } catch (e) { showToast("Gagal menyimpan ke Cloud."); }
                }
                setModals({ ...modals, form: false });
                setForm(initialForm);
                setEditingId(null);
            };

            const deleteStudent = (id, name) => {
                askConfirm(`Hapus data ${name} permanen?`, async () => {
                    if (user) await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'students', id));
                    showToast(`${name} dihapus.`);
                });
            };

            // Presensi
            const processAttendance = async () => {
                if (!attendanceNote.trim()) return showToast("Isi materi hari ini!");

                const currentCount = activeStudent.attendanceCount || 0;
                const deposit = activeStudent.deposit || 0;
                if (currentCount >= deposit) return showToast(`Gagal! Kuota sesi ${activeStudent.name} habis.`);

                const newCount = currentCount + 1;
                if (user) {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'students', activeStudent.id), { attendanceCount: newCount });
                }
                addLog(activeStudent.name, 'Hadir', 1, attendanceNote.trim());

                const rem = deposit - newCount;
                const msg = `*LAPORAN LES BETA EXACT*\nHalo Bapak/Ibu ${activeStudent.parent || ''},\n*${activeStudent.name}* telah selesai belajar.\n\n📚 *Materi:* ${attendanceNote.trim()}\n📉 *Sisa Kuota:* ${rem} sesi lagi.\n\n📍 *Lokasi:* ${MAPS_URL}`;
                
                if(activeStudent.phone) window.open(`https://api.whatsapp.com/send?phone=${formatWA(activeStudent.phone)}&text=${encodeURIComponent(msg)}`, '_blank');
                
                setModals({ ...modals, attendance: false });
                setAttendanceNote('');
                setActiveStudent(null);
            };

            // Penyesuaian Sesi (+ / -)
            const openAdjustModal = (student, type) => {
                setActiveStudent(student);
                setAdjustType(type); 
                setAdjustAmount(type === 'add' ? student.deposit : ''); 
                setAdjustNote('');
                setModals({...modals, adjustSession: true});
            };

            const handleAdjustSubmit = async (e) => {
                e.preventDefault();
                const amt = parseInt(adjustAmount);
                if(isNaN(amt) || amt <= 0) return showToast("Jumlah tidak valid!");
                if(adjustType === 'deduct' && !adjustNote.trim()) return showToast("Alasan wajib diisi!");

                const remOld = (activeStudent.deposit || 0) - (activeStudent.attendanceCount || 0);
                if(adjustType === 'deduct' && amt > remOld) return showToast("Pengurangan melebihi sisa sesi!");

                const newDepositTotal = adjustType === 'add' ? remOld + amt : remOld - amt;
                const logType = adjustType === 'add' ? 'Top-Up' : 'Pengurangan';
                const logNote = adjustNote || (adjustType === 'add' ? 'Beli Sesi' : 'Koreksi');

                if (user) {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'students', activeStudent.id), { deposit: newDepositTotal, attendanceCount: 0 });
                }
                addLog(activeStudent.name, logType, amt, logNote);

                showToast(`Sesi berhasil disesuaikan.`);
                setModals({...modals, adjustSession: false});
                setActiveStudent(null);
            };

            // Export
            const downloadPoster = () => {
                if (!scheduleRef.current) return;
                const editBtns = scheduleRef.current.querySelectorAll('.hide-on-print');
                editBtns.forEach(btn => btn.style.display = 'none');

                html2canvas(scheduleRef.current, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                    const link = document.createElement('a'); link.download = `Jadwal_Beta_Exact.png`; link.href = canvas.toDataURL('image/png'); link.click();
                    editBtns.forEach(btn => btn.style.display = 'flex');
                });
            };

            const downloadExcel = () => {
                if (!window.XLSX || logs.length === 0) return showToast("Data kosong.");
                const data = logs.map(l => ({
                    'Waktu': new Date(l.date).toLocaleString('id-ID'),
                    'Nama Siswa': l.studentName,
                    'Tipe': l.type,
                    'Sesi': (l.type === 'Hadir' || l.type === 'Pengurangan') ? `-${l.amount}` : `+${l.amount}`,
                    'Keterangan': l.note || '-'
                }));
                const ws = window.XLSX.utils.json_to_sheet(data);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Pembukuan");
                window.XLSX.writeFile(wb, `Pembukuan_Beta_Exact.xlsx`);
            };

            // Broadcast
            const startBroadcastQueue = () => {
                if(!broadcastMsg.trim()) return showToast("Isi pesan siaran!");
                if(students.length === 0) return;
                setBroadcastQueue(students.map(s => ({ ...s, status: 'pending' })));
            };

            const sendWAQueue = (student) => {
                if(!student.phone) { showToast(`WA ${student.name} kosong`); }
                else { window.open(`https://api.whatsapp.com/send?phone=${formatWA(student.phone)}&text=${encodeURIComponent(broadcastMsg)}`, '_blank'); }
                setBroadcastQueue(prev => prev.map(s => s.id === student.id ? { ...s, status: 'sent' } : s));
            };

            // LOADING SCREEN BY SYNCNINDO
            if (!isLoaded) return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50">
                    <Icon name="cloud" className="w-10 h-10 animate-bounce text-orange-500"/>
                    <p className="mt-4 font-bold text-slate-500">Memuat Sistem...</p>
                    <p className="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">by Syncnindo Builder</p>
                </div>
            );

            // Navigasi Item
            const navItems = [
                { id: 'siswa', icon: 'users', label: 'Daftar Siswa' },
                { id: 'jadwal', icon: 'calendar', label: 'Jadwal Kelas' },
                { id: 'buku', icon: 'book', label: 'Pembukuan' },
                { id: 'siaran', icon: 'megaphone', label: 'Siaran WA' },
                { id: 'info', icon: 'info', label: 'Pusat Info' }
            ];

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden">
                    
                    {/* CUSTOM TOAST */}
                    {toastMsg && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[200] flex justify-center animate-fade pointer-events-none px-4">
                            <div className="bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-xl font-bold text-sm flex items-center gap-3">
                                <Icon name="info" className="w-6 h-6 text-orange-400" /> {toastMsg}
                            </div>
                        </div>
                    )}

                    {/* CUSTOM CONFIRM */}
                    {confirmObj.isOpen && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade">
                            <div className="bg-white rounded-3xl p-8 shadow-2xl max-w-sm w-full text-center animate-slide-up">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="info" className="w-10 h-10" />
                                </div>
                                <h3 className="font-bold text-slate-800 text-lg mb-8">{confirmObj.msg}</h3>
                                <div className="flex gap-4">
                                    <button onClick={closeConfirm} className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={() => { confirmObj.onConfirm(); closeConfirm(); }} className="flex-1 bg-red-500 text-white font-bold py-4 rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-200">Ya, Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* SIDEBAR (Desktop/Tablet 16:9) DENGAN BRANDING SYNCNINDO */}
                    <aside className="hidden md:flex flex-col w-72 bg-white border-r border-slate-200 h-full shadow-sm z-20">
                        <div className="p-8 border-b border-slate-100 flex items-center gap-4">
                            <div className="bg-orange-100 p-2.5 rounded-2xl text-orange-600 shadow-inner">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=BE&backgroundColor=ea580c" className="w-10 h-10 rounded-xl" alt="logo" crossOrigin="anonymous"/>
                            </div>
                            <div>
                                <h1 className="font-bold text-xl text-slate-800 tracking-tight">Beta Exact</h1>
                                <p className="text-xs font-semibold text-emerald-600 flex items-center gap-1 mt-0.5"><Icon name="cloud" className="w-4 h-4"/> Sync Aktif</p>
                            </div>
                        </div>
                        <nav className="flex-1 p-6 space-y-3 overflow-y-auto no-scrollbar">
                            {navItems.map(t => (
                                <button 
                                    key={t.id} onClick={() => setActiveTab(t.id)}
                                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-semibold text-base ${activeTab === t.id ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800 border border-transparent'}`}
                                >
                                    <Icon name={t.icon} className="w-6 h-6" /> {t.label}
                                </button>
                            ))}
                        </nav>
                        
                        {/* FOOTER SIDEBAR SYNCNINDO */}
                        <div className="p-6 border-t border-slate-100 text-center">
                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em]">Developed by</p>
                            <p className="text-xs font-black text-orange-600 mt-1">Syncnindo Builder</p>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 flex flex-col h-full w-full relative">
                        
                        {/* Header Mobile */}
                        <header className="md:hidden bg-white border-b border-slate-200 px-5 py-4 flex items-center justify-between z-20 shadow-sm sticky top-0">
                            <div className="flex items-center gap-3">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=BE&backgroundColor=ea580c" className="w-10 h-10 rounded-xl" alt="logo" crossOrigin="anonymous"/>
                                <div>

                                                        <div key={day} className={`flex flex-col sm:flex-row sm:items-center justify-between p-3.5 rounded-xl border transition-all gap-3 ${isActive ? 'border-orange-400 bg-orange-50 shadow-sm' : 'border-slate-200 bg-white'}`}>
                                                            <label className="flex items-center gap-3 cursor-pointer flex-1">
                                                                <input type="checkbox" checked={isActive} onChange={(e) => toggleScheduleDay(day, e.target.checked)} className="w-5 h-5 accent-orange-600 rounded cursor-pointer" />
                                                                <span className={`text-sm font-bold ${isActive ? 'text-orange-700' : 'text-slate-600'}`}>{day}</span>
                                                            </label>
                                                            {isActive && (
                                                                <input type="time" value={timeVal} onChange={(e) => updateScheduleTime(day, e.target.value)} className="text-sm font-bold p-2.5 rounded-lg border border-orange-200 outline-none focus:border-orange-500 bg-white text-orange-700 shadow-sm w-full sm:w-32 text-center" required />
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-orange-600 text-white font-bold py-4 rounded-xl mt-2 hover:bg-orange-700 active:scale-95 transition-all text-sm shadow-md">Simpan Data</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL PENYESUAIAN SESI (TOP UP / KURANGI) */}
                    {modals.adjustSession && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade">
                            <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                                <div className={`p-6 text-white text-center ${adjustType === 'add' ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                    <h3 className="font-bold text-lg">{adjustType === 'add' ? 'Isi Ulang Paket Sesi' : 'Kurangi Sesi Manual'}</h3>
                                    <p className="text-xs font-medium opacity-80 mt-1">{activeStudent?.name}</p>
                                </div>
                                <form onSubmit={handleAdjustSubmit} className="p-6 space-y-6">
                                    <div className="text-center border-b border-slate-100 pb-5">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Sisa Kuota Saat Ini</p>
                                        <p className="text-4xl font-black text-slate-800">
                                            {(activeStudent?.deposit || 0) - (activeStudent?.attendanceCount || 0)}
                                        </p>
                                    </div>
                                    <div>
                                        <label className={`text-xs font-bold uppercase tracking-widest ${adjustType === 'add' ? 'text-emerald-600' : 'text-red-600'}`}>
                                            {adjustType === 'add' ? 'Beli Berapa Sesi?' : 'Kurangi Berapa Sesi?'}
                                        </label>
                                        <input 
                                            type="number" required min="1" 
                                            className={`w-full mt-2 bg-slate-50 p-4 rounded-xl text-xl text-center border focus:outline-none font-black transition-colors ${adjustType === 'add' ? 'border-emerald-200 focus:border-emerald-500 text-emerald-700' : 'border-red-200 focus:border-red-500 text-red-700'}`} 
                                            value={adjustAmount} onChange={e => setAdjustAmount(e.target.value)} 
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest block">Keterangan / Alasan</label>
                                        <input 
                                            type="text" required={adjustType === 'deduct'}
                                            placeholder={adjustType === 'add' ? 'Misal: Beli paket bulanan...' : 'Misal: Koreksi admin...'}
                                            className="w-full mt-2 bg-white p-3.5 rounded-xl text-sm border border-slate-200 focus:border-slate-400 outline-none font-medium" 
                                            value={adjustNote} onChange={e => setAdjustNote(e.target.value)} 
                                        />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setModals({...modals, adjustSession: false})} className="flex-1 font-bold text-slate-500 bg-slate-100 py-3.5 rounded-xl text-sm hover:bg-slate-200 transition-colors">Batal</button>
                                        <button type="submit" className={`flex-[2] text-white font-bold py-3.5 rounded-xl text-sm shadow-md hover:opacity-90 transition-opacity ${adjustType === 'add' ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                            Simpan Perubahan
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL KEHADIRAN (LAPOR WA) */}
                    {modals.attendance && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                                <div className="bg-orange-50 p-6 text-center border-b border-orange-100">
                                    <h3 className="font-bold text-orange-800 text-lg">Catat Kehadiran</h3>
                                    <p className="text-xs font-medium text-orange-600 mt-1">{activeStudent?.name}</p>
                                </div>
                                <div className="p-8">
                                    <label className="text-xs font-bold text-slate-600 mb-3 block uppercase tracking-wider">Materi Yang Diajarkan:</label>
                                    <textarea 
                                        className="w-full bg-slate-50 p-5 rounded-2xl text-sm h-40 border border-slate-200 outline-none focus:border-orange-400 resize-none mb-6 font-medium" 
                                        placeholder="Ketik detail materi hari ini..." 
                                        value={attendanceNote} onChange={e => setAttendanceNote(e.target.value)} 
                                    />
                                    <div className="flex gap-4">
                                        <button onClick={() => setModals({...modals, attendance: false})} className="flex-1 font-bold text-slate-500 bg-slate-100 py-3.5 rounded-xl text-sm hover:bg-slate-200 transition-colors">Batal</button>
                                        <button onClick={processAttendance} className="flex-[2] bg-emerald-600 text-white font-bold py-3.5 rounded-xl text-sm hover:bg-emerald-700 active:scale-95 flex items-center justify-center gap-2 transition-transform shadow-md">
                                            <Icon name="whatsapp" className="w-6 h-6"/> Kirim WA
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
